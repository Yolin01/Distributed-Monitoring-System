name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ${{ github.repository }}/monitoring-server
  IMAGE_AGENT: ${{ github.repository }}/monitoring-agent

jobs:

  # ── 1. Tests automatisés ──────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monitoring_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name:  Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/server/requirements.txt

      - name:  Install dependencies
        run: |
          pip install -r src/server/requirements.txt
          pip install pytest pytest-cov httpx

      - name:  Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monitoring_test
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          SECRET_KEY: ci-test-secret-key-minimum-32-chars
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          ENV: test
          RABBITMQ_QUEUE: metrics
          PYTHONPATH: src/server
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name:  Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── 2. Lint et qualité du code ────────────────────────────────
  lint:
    name:  Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name:  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name:  Install linters
        run: pip install flake8 black isort

      - name:  Check formatting (black)
        run: black --check src/server/app src/agent/agent.py
        continue-on-error: true

      - name:  Check imports (isort)
        run: isort --check-only src/server/app
        continue-on-error: true

      - name:  Check style (flake8)
        run: flake8 src/server/app --max-line-length=100 --exclude=__pycache__
        continue-on-error: true

  # ── 3. Build images Docker ────────────────────────────────────
  build:
    name:  Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name:  Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name:  Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/server/Dockerfile
          push: false
          tags: monitoring-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name:  Build agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/agent/Dockerfile
          push: false
          tags: monitoring-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Push vers registry (main uniquement) ───────────────────
  push:
    name:  Push Registry
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name:  Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name:  Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name:  Push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_SERVER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_SERVER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name:  Push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_AGENT }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_AGENT }}:${{ github.sha }}

  # ── 5. Deploy (main uniquement) ───────────────────────────────
  deploy:
    name:  Deploy
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name:  Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/monitoring
            git pull origin main
            docker compose pull
            docker compose up -d --no-build
            docker compose ps
            echo " Déploiement terminé"