services:

  # ── API Server ────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: src/server/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Consumer RabbitMQ → PostgreSQL ───────────────────────────
  consumer:
    build:
      context: .
      dockerfile: src/server/Dockerfile
    command: python -m app.services.rabbitmq_consumer
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Agent de collecte ─────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: src/agent/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: unless-stopped

  # ── Base de données ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Message Broker ────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmq_data:
  prometheus_data:
  grafana_data: