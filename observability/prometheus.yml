global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "monitoring-server"
    static_configs:
      - targets: ["server:8000"]
    metrics_path: /metrics

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]